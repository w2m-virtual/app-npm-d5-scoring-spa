server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # SPA intranet de scoring: same-origin proxy directo a scoring-api en cluster
    # (coherente con catalog y supplier; bypass Kong porque es tráfico intranet).
    location /api/ {
        proxy_pass http://app-mvn-d5-scoring-api.w2m-virtual.svc.cluster.local:8087/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
}

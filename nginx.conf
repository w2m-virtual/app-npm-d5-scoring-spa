server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # API calls go through the in-cluster Kong gateway.
    # /api/customer/foo  -> http://kong.gateway.svc.cluster.local:8000/customer/foo
    # The SPA bundle sets apiBaseUrl='/api' so calls land here as same-origin (no CORS).
    location /api/ {
        proxy_pass http://kong.gateway.svc.cluster.local:8000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
}
